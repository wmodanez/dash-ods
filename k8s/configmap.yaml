apiVersion: v1
kind: ConfigMap
metadata:
  name: ods-config
  labels:
    app: ods-painel
data:
  DEBUG: "false"
  USE_RELOADER: "false"
  PORT: "8050"
  HOST: "0.0.0.0"
  openshift-entrypoint.sh: |
    #!/bin/bash
    set -e
    
    # Adiciona o usuário atual ao /etc/passwd se necessário
    if ! whoami &> /dev/null; then
      if [ -w /etc/passwd ]; then
        echo "${USER_NAME:-default}:x:$(id -u):0:${USER_NAME:-default} user:${HOME}:/sbin/nologin" >> /etc/passwd
      fi
    fi
    
    # Calcula o número de workers baseado nas CPUs disponíveis
    CORES=$(nproc)
    WORKERS=$((CORES * 2 + 1))  # Fórmula recomendada: (2 x num_cores) + 1
    THREADS=$((CORES * 2))      # 2 threads por core
    
    # Inicia o Gunicorn com configurações otimizadas
    exec gunicorn \
      -w $WORKERS \
      --threads $THREADS \
      -b 0.0.0.0:8050 \
      --timeout 120 \
      --worker-class gthread \
      --max-requests 1000 \
      --max-requests-jitter 50 \
      --forwarded-allow-ips="*" \
      --access-logfile - \
      --error-logfile - \
      --log-level debug \
      app:server 