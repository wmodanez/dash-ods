apiVersion: v1
kind: ConfigMap
metadata:
  name: ods-config
  labels:
    app: ods-painel
data:
  DEBUG: "false"
  USE_RELOADER: "false"
  PORT: "8050"
  HOST: "0.0.0.0"
  openshift-entrypoint.sh: |
    #!/bin/bash
    set -e
    
    # Adiciona o usuário atual ao /etc/passwd se necessário
    if ! whoami &> /dev/null; then
      if [ -w /etc/passwd ]; then
        echo "${USER_NAME:-default}:x:$(id -u):0:${USER_NAME:-default} user:${HOME}:/sbin/nologin" >> /etc/passwd
      fi
    fi
    
    # Calcula o número de workers baseado nas CPUs disponíveis
    CORES=$(nproc)
    WORKERS=$((CORES * 2 + 1))  # Fórmula recomendada: (2 x num_cores) + 1
    THREADS=$((CORES * 2))      # 2 threads por core
    
    # Inicia o Gunicorn com configurações otimizadas
    exec gunicorn \
      -w $WORKERS \
      --threads $THREADS \
      -b 0.0.0.0:8050 \
      --timeout 120 \
      --worker-class gthread \
      --max-requests 1000 \
      --max-requests-jitter 50 \
      --forwarded-allow-ips="*" \
      --access-logfile - \
      --error-logfile - \
      --log-level debug \
      app:server

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: colocation-imb
data:
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        client_max_body_size 100M;
        keepalive_timeout 60;

        # Configuração de CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        location / {
            proxy_pass http://localhost:8050;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_read_timeout 120;
            proxy_connect_timeout 120;
            
            # Configurações para WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Configuração específica para os endpoints do Dash
        location /_dash-component-suites/ {
            proxy_pass http://localhost:8050;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-CSRFToken $http_x_csrftoken;
            proxy_redirect off;
            proxy_buffering off;
            
            # Headers de segurança
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /assets/ {
            alias /app/assets/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # Configuração de gzip para melhor performance
        gzip on;
        gzip_disable "msie6";
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    } 